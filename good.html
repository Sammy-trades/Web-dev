<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel's Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
 <style>
  body {
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f766e, #14b8a6); /* black/Lagosvibe*/
  color:white
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  max-width: 800px;
  padding: 40px 20px;
}

header h1 {
  font-size: 2.8rem;
  margin-bottom: 5px;
}

.date {
  font-size: 1.1rem;
  opacity: 0.9;
}

.animation-container {
  margin: 40px 0;
}

.animated-image {
  max-width: 220px;
  height: auto;
  border-radius: 50%;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.links h2 {
  font-size: 1.6rem;
  margin-bottom: 20px;
}

.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
}

.link-card {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  padding: 20px 15px;
  border-radius: 16px;
  text-decoration: none;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.link-card:hover {
  background: rgba(255, 255, 255, 0.35);
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Good morning,🌅</h1>
      <p class="date">Friday, April 3, 2026</p>
    </header>
    <div class="animation-container">
      <img src="content://com.android.externalstorage.documents/document/primary%3ADownload%2Fimage-4.jpg" alt="My animated image" class="animated-image">
    </div>

    <section class="links">
      <h2>Quick Links</h2>
      <div class="link-grid">
        <a href="https://x.com/@Geeze_Sammy" class="link-card" target="_blank">𝕏 (@Geeze_Sammy)</a>
        <a href="https://gmail.com/graceorefodu@gmail.com" class="link-card" target="_blank">graceorefodu@gmail.com</a>
        <a href="https://youtube.com" class="link-card" target="_blank">YouTube</a>
        <a href="https://news.google.com" class="link-card" target="_blank">News</a>
      </div>
    </section>
  </div>
</body>
</html>
